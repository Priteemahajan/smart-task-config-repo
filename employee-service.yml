server:
  port: 8081

spring:
  application:
    name: employee-service

  datasource:
    url: jdbc:postgresql://localhost:5432/smart_task_assignment_db
    username: postgres
    password: priti

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true


  kafka:
    bootstrap-servers: localhost:9092

    consumer:
      group-id: employee-group
      auto-offset-reset: latest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer

      properties:
        spring:
          json:
            trusted:
              packages: "*"
            use:
              type:
                headers: false
            value:
              default:
                type: com.smart.employeeservice.event.TaskCreatedEvent

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka

kafka:
  topic:
    task-created: task-created-topic
